<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Your Name</title>
  <meta name="description" content="Blog posts by Your Name on research, CS, and academic life.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <ul id="nav-menu">
      <li><a href="index.html">home</a></li>
      <li><a href="cv.pdf" target="_blank" rel="noopener">cv</a></li>
      <li><a href="publications.html">research</a></li>
      <li><a href="blog.html" class="active">blog</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Blog</h1>
      <p>Thoughts on research, computer science, and academic life.</p>
    </div>
  </header>

  <section class="blog-listing">
    <div class="container" id="blog-list">
      <p class="loading-msg">Loading posts...</p>
    </div>
  </section>

  <footer>
    <p>&copy; <span id="year"></span> Your Name</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function () {
      var container = document.getElementById('blog-list');

      function formatDate(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      fetch('blog/posts.json')
        .then(function (r) { return r.json(); })
        .then(function (posts) {
          container.innerHTML = '';
          posts.forEach(function (post) {
            var card = document.createElement('article');
            card.className = 'blog-card';
            card.innerHTML =
              '<div class="blog-card-meta">' +
                '<span class="blog-date">' + formatDate(post.date) + '</span>' +
                '<span class="blog-tag">' + post.tag + '</span>' +
              '</div>' +
              '<h2><a href="blog/post.html?post=' + encodeURIComponent(post.slug) + '">' + post.title + '</a></h2>' +
              '<p>' + post.summary + '</p>' +
              '<a href="blog/post.html?post=' + encodeURIComponent(post.slug) + '" class="read-more">Read more <i class="fa-solid fa-arrow-right"></i></a>';
            container.appendChild(card);
          });
        })
        .catch(function () {
          container.innerHTML = '<p>Could not load posts. Please try again later.</p>';
        });
    })();
  </script>
</body>
</html>
