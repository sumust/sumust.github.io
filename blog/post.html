<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… – Your Name</title>
  <meta name="description" content="Blog post by [Your Name].">

  <!-- Google Fonts (body only) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Marked.js – lightweight Markdown renderer -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha512-pMBVMBmSVkRHABJFGMGiol5GrHBioh2GaPDBVs5OBnkRZNqKboyHcfLTNITAYOLRwEaqhOmlMGW7i95TlEuEOA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- Stylesheet (one level up) -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ============ Navigation ============ -->
  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="site-name">Your Name</a>
      <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
      <ul id="nav-menu">
        <li><a href="../index.html"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="../index.html#research"><i class="fa-solid fa-flask"></i> Research</a></li>
        <li><a href="../publications.html"><i class="fa-solid fa-book"></i> Publications</a></li>
        <li><a href="../blog.html" class="active"><i class="fa-solid fa-pen-nib"></i> Blog</a></li>
        <li><a href="../index.html#teaching"><i class="fa-solid fa-chalkboard-user"></i> Teaching</a></li>
        <li><a href="../cv.pdf" target="_blank"><i class="fa-solid fa-file-lines"></i> CV</a></li>
        <li><a href="../index.html#contact"><i class="fa-solid fa-envelope"></i> Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ============ Blog Post (rendered dynamically) ============ -->
  <article class="blog-post">
    <div class="container">
      <header class="post-header" id="post-header">
        <p class="loading-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading post&hellip;</p>
      </header>
      <div class="post-body" id="post-body"></div>
      <div class="post-nav">
        <a href="../blog.html"><i class="fa-solid fa-arrow-left"></i> Back to all posts</a>
      </div>
    </div>
  </article>

  <!-- ============ Footer ============ -->
  <footer>
    <div class="footer-inner">
      <div class="footer-social">
        <a href="https://scholar.google.com/" target="_blank" rel="noopener" aria-label="Google Scholar"><i class="fa-solid fa-graduation-cap"></i></a>
        <a href="https://github.com/sumust" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://twitter.com/yourusername" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
      </div>
      <p>&copy; <span id="year"></span> Your Name &middot; Powered by <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a></p>
    </div>
  </footer>

  <!-- ============ Scripts ============ -->
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Mobile nav toggle
    document.querySelector('.nav-toggle').addEventListener('click', function () {
      document.getElementById('nav-menu').classList.toggle('open');
    });
    document.querySelectorAll('#nav-menu a').forEach(function (link) {
      link.addEventListener('click', function () {
        document.getElementById('nav-menu').classList.remove('open');
      });
    });

    // Load and render the blog post
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');
      var headerEl = document.getElementById('post-header');
      var bodyEl = document.getElementById('post-body');

      if (!slug || !/^[a-zA-Z0-9_-]+$/.test(slug)) {
        headerEl.innerHTML = '<h1>Post not found</h1>';
        bodyEl.innerHTML = '<p>Sorry, this post does not exist. <a href="../blog.html">Back to blog</a>.</p>';
        return;
      }

      function formatDate(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      // Fetch post metadata from posts.json
      fetch('posts.json')
        .then(function (r) { return r.json(); })
        .then(function (posts) {
          var meta = null;
          for (var i = 0; i < posts.length; i++) {
            if (posts[i].slug === slug) { meta = posts[i]; break; }
          }

          // Fetch the Markdown file
          return fetch('posts/' + slug + '.md')
            .then(function (r) {
              if (!r.ok) throw new Error('Not found');
              return r.text();
            })
            .then(function (md) {
              // Render header
              if (meta) {
                document.title = meta.title + ' – Your Name';
                headerEl.innerHTML =
                  '<div class="post-meta">' +
                    '<span><i class="fa-regular fa-calendar"></i> ' + formatDate(meta.date) + '</span>' +
                    '<span><i class="fa-regular fa-clock"></i> ' + meta.readTime + '</span>' +
                    '<span class="blog-tag">' + meta.tag + '</span>' +
                  '</div>' +
                  '<h1>' + meta.title + '</h1>';
              } else {
                headerEl.innerHTML = '';
              }

              // Render Markdown body (skip the first # heading since we show it in header)
              var cleanMd = md.replace(/^#\s+.+\n*/, '');
              bodyEl.innerHTML = marked.parse(cleanMd);
            });
        })
        .catch(function () {
          headerEl.innerHTML = '<h1>Post not found</h1>';
          bodyEl.innerHTML = '<p>Sorry, we couldn\'t load this post. <a href="../blog.html">Back to blog</a>.</p>';
        });
    })();
  </script>
</body>
</html>
